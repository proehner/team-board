name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Nur einen gleichzeitigen Deploy zulassen
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Frontend-Abhängigkeiten installieren
        run: npm ci

      - name: Frontend bauen
        run: npm run build
        env:
          # Basis-Pfad: automatisch aus dem Repository-Namen abgeleitet
          # z. B. Repository "team-lead" → /team-lead/
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          # Backend-URL: als Repository-Variable hinterlegen
          # Settings → Variables → Actions → VITE_API_URL = https://mein-server.example.com
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Build-Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Auf GitHub Pages deployen
        id: deployment
        uses: actions/deploy-pages@v4
